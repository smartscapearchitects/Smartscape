<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartscape | Student Talent Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { forest: '#14342B', mint: '#60D394', darkBg: '#0B0F0E', cardBg: '#131A18' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Plus Jakarta Sans', sans-serif; } </style>
</head>
<body class="bg-darkBg text-gray-100 antialiased">

    <nav class="border-b border-gray-800 bg-darkBg/80 backdrop-blur-md fixed top-0 w-full z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-xl font-bold tracking-tight text-white">Smart<span class="text-mint">scape</span></span>
            </div>
            <div class="hidden md:flex gap-8 text-sm font-medium text-gray-400 items-center">
                <a href="index.html" class="hover:text-mint transition">Marketplace</a>
                <a href="showcase.html" class="text-white font-bold border-b-2 border-mint pb-1">Student Showcase</a>
            </div>
            <div class="flex gap-4 items-center">
                <button class="bg-mint text-darkBg text-sm font-semibold px-5 py-2.5 rounded-full hover:bg-white transition">Recruiter Access</button>
            </div>
        </div>
    </nav>

    <section class="pt-36 pb-12 px-6 text-center max-w-4xl mx-auto">
        <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">Student Design <span class="text-mint">Showcase</span></h1>
        <p class="text-gray-400 text-lg">Exhibiting the next generation of spatial design talent.</p>
    </section>

    <section class="py-10 px-6 max-w-7xl mx-auto min-h-screen">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="bg-cardBg rounded-2xl overflow-hidden border border-gray-800">
                <div class="h-64 bg-gradient-to-tr from-emerald-900 to-forest"></div>
                <div class="p-5">
                    <h3 class="text-lg font-bold text-white mb-1">Urban River Corridor</h3>
                    <p class="text-mint text-xs font-semibold mb-3">Landscape Architecture</p>
                    <p class="text-gray-400 text-sm">Sustainable drainage and biophilic urban design project.</p>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
